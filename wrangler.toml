# Cloudflare Pages + Workers 配置
# 最小可运行版本：KV 绑定设置为 placeholder（本地 in-memory 模式）
# 如需持久化，请将下方 id/preview_id 替换为真实的 KV namespace ID

name = "neko-diary"
compatibility_date = "2026-04-16"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# ─── Cloudflare KV 绑定 ──────────────────────────────────────
[[kv_namespaces]]
binding = "DIARY_KV"
id = "e51f7cda15fc4e6b9d1683f6998262f3"
preview_id = "e51f7cda15fc4e6b9d1683f6998262f3"

# ─── 本地开发变量 ──────────────────────────────────────────
# 生产环境请在 Cloudflare Dashboard → Pages → Settings → Environment Variables 中配置
# 或在 .dev.vars 文件中配置（本地开发用，已加入 .gitignore）
